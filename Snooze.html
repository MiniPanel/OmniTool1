<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snooze</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f4f4f7;
            padding: 20px 24px 40px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e0e0e8;
        }

        .page-header i {
            font-size: 18px;
            color: #a78bfa;
        }

        .page-header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #111118;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .btn-main {
            background: linear-gradient(135deg, #EF4765, #FF9A5A);
            border: none;
            border-radius: 7px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 9px 14px;
            text-align: left;
            transition: opacity 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            line-height: 1.3;
        }

        .btn-main:hover {
            opacity: 0.92;
            box-shadow: 0 2px 12px rgba(239, 71, 101, 0.35);
        }

        .btn-main i {
            font-size: 13px;
            flex-shrink: 0;
            opacity: 0.9;
        }

        .btn-num {
            font-size: 10px;
            opacity: 0.75;
            flex-shrink: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 1px 5px;
            font-weight: 700;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111118;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            padding: 9px 16px;
            border-radius: 7px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 999;
        }

        #toast.show { opacity: 1; transform: translateY(0); }
        #toast i { color: #4ade80; font-size: 14px; }
    </style>
</head>
<body>

<div class="page-header">
    <i class="ti ti-clock-pause"></i>
    <h1>Snooze Messages</h1>
</div>

<div class="btn-grid">

    <button class="btn-main" onclick="copy('We are currently having a high volume of customer requests, sorry for the delay in response')">
        <i class="ti ti-users"></i><span class="btn-num">01</span> High Volume of Customers
    </button>

    <button class="btn-main" onclick="copy('I apologize for the delay in response, We could not assist you as there was a tool down time.')">
        <i class="ti ti-tool"></i><span class="btn-num">02</span> Tool Downtime
    </button>

    <button class="btn-main" onclick="copy('Thank you for contacting HP Support via WhatsApp. We\'re back and ready to assist you.')">
        <i class="ti ti-check"></i><span class="btn-num">03</span> Back and Ready to Assist 1
    </button>

    <button class="btn-main" onclick="copy('Thank you for contacting HP Support via WhatsApp. We apologize for the delay in our response. If you still need assistance please reply to this message. We appreciate your patience.')">
        <i class="ti ti-message-circle"></i><span class="btn-num">04</span> Still Need Assistance
    </button>

    <button class="btn-main" onclick="copy('Hello, we have been working on your case and we have some updates for you. Please reply to this message if you would like to know more about it. We appreciate your patience.')">
        <i class="ti ti-bell"></i><span class="btn-num">05</span> We Have Updates
    </button>

    <button class="btn-main" onclick="copy('Hello, thank you for contacting HP Support via WhatsApp. We are back and ready to assist you. If you still need assistance please reply to this message.')">
        <i class="ti ti-check"></i><span class="btn-num">06</span> Back and Ready to Assist 2
    </button>

    <button class="btn-main" onclick="copy('Hello, we have not heard back from you. Please let us know whether your issue is resolved or you need additional help. If no feedback is provided we will proceed to close the conversation in the next 24 hours. Thank you in advance.')">
        <i class="ti ti-clock"></i><span class="btn-num">07</span> 24 Hours Snooze
    </button>

    <button class="btn-main" onclick="copy('Hello, we have not heard back from you, so, we will proceed to close this conversation. If you still need assistance please contact us again. Have a great day!')">
        <i class="ti ti-x"></i><span class="btn-num">08</span> End Conversation
    </button>

    <button class="btn-main" onclick="copy('This chat will be locked on my end post 24 hours after your last response. Following that, I will only be able to send a reminder message. Once you reply, the conversation will be unlocked, and I can continue to assist you further.')">
        <i class="ti ti-lock"></i><span class="btn-num">09</span> Chat Lock
    </button>

</div>

<div id="toast"><i class="ti ti-check"></i> Copied to clipboard</div>

<script>
    function copy(text) {
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }).catch(err => console.error('Copy failed:', err));
    }
</script>

</body>
</html>
