<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Queue Copy Tool</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f4f4f7;
            padding: 20px 24px 40px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e0e0e8;
        }

        .page-header i { font-size: 18px; color: #a78bfa; }

        .page-header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #111118;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
            margin: 22px 0 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .section-label:first-of-type { margin-top: 0; }

        .section-label .flag { font-size: 13px; }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .btn-main {
            background: linear-gradient(135deg, #EF4765, #FF9A5A);
            border: none;
            border-radius: 7px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 9px 14px;
            text-align: left;
            transition: opacity 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            line-height: 1.3;
        }

        .btn-main:hover {
            opacity: 0.92;
            box-shadow: 0 2px 12px rgba(239, 71, 101, 0.35);
        }

        .btn-main i { font-size: 13px; flex-shrink: 0; opacity: 0.9; }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111118;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            padding: 9px 16px;
            border-radius: 7px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 999;
        }

        #toast.show { opacity: 1; transform: translateY(0); }
        #toast i { color: #4ade80; font-size: 14px; }
    </style>
</head>
<body>

<div class="page-header">
    <i class="ti ti-list-details"></i>
    <h1>APAC Queue Copy Tool</h1>
</div>

<div class="section-label"><span class="flag">🇦🇺</span> Australia (ANZ / AU Queues)</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('ANZ_RPA_Onsite')">
        <i class="ti ti-robot"></i> ANZ onsite bot queue
    </button>
    <button class="btn-main" onclick="copy('ANZ_RPA_PURR')">
        <i class="ti ti-robot"></i> ANZ bot PURR queue
    </button>
    <button class="btn-main" onclick="copy('AU_PPS_KCI')">
        <i class="ti ti-truck-delivery"></i> AU manual onsite queue
    </button>
    <button class="btn-main" onclick="copy('AUY_AD BENCH PURR')">
        <i class="ti ti-truck-return"></i> AU manual PURR queue
    </button>
    <button class="btn-main" onclick="copy('SPY_AD QUOTE BENCH-PPS')">
        <i class="ti ti-file-invoice"></i> ANZ quote PURR queue
    </button>
    <button class="btn-main" onclick="copy('SPY_AD QUOTE ONSITE-PPS')">
        <i class="ti ti-file-invoice"></i> ANZ onsite PURR queue
    </button>
    <button class="btn-main" onclick="copy('SPY_AD_CSR ADMIN')">
        <i class="ti ti-headset"></i> ANZ CSR queue
    </button>
    <button class="btn-main" onclick="copy('SPY_ES CaseReview')">
        <i class="ti ti-clipboard-check"></i> ANZ CRM queue
    </button>
    <button class="btn-main" onclick="copy('SPY_ES DOA')">
        <i class="ti ti-alert-triangle"></i> ANZ DOA queue
    </button>
    <button class="btn-main" onclick="copy('NZA_AD PURR')">
        <i class="ti ti-truck-return"></i> New Zealand manual PURR queue
    </button>
    <button class="btn-main" onclick="copy('AUA-EEG-PR-6JONSITE')">
        <i class="ti ti-truck-return"></i> 1M process(1M/6J/Desktops)
    </button>
    <button class="btn-main" onclick="copy('AUA-PR-CSR_Infinet')">
        <i class="ti ti-truck-return"></i> Infinite process(comm/con monitors)
    </button>
</div>

<div class="section-label"><span class="flag">🇮🇩</span> Indonesia</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('IDY_SO CSR')">
        <i class="ti ti-headset"></i> Indonesia CSR queue
    </button>
    <button class="btn-main" onclick="copy('IDY_SO PPS ONSITE')">
        <i class="ti ti-truck-delivery"></i> Indonesia onsite queue
    </button>
    <button class="btn-main" onclick="copy('IDY_SO PSG ONSITE')">
        <i class="ti ti-truck-delivery"></i> Indonesia onsite queue
    </button>
</div>

<div class="section-label"><span class="flag">🇲🇾</span> Malaysia</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('MYY_AD PPS ONSITE QUOTE')">
        <i class="ti ti-file-invoice"></i> Malaysia onsite quote queue
    </button>
    <button class="btn-main" onclick="copy('MYY_LP PPS CSR')">
        <i class="ti ti-headset"></i> Malaysia CSR queue
    </button>
    <button class="btn-main" onclick="copy('MYY_OS PPS DISPATCH')">
        <i class="ti ti-truck-delivery"></i> Malaysia onsite queue
    </button>
    <button class="btn-main" onclick="copy('MY_PH_ONS_BOT')">
        <i class="ti ti-robot"></i> Malaysia Onsite BOT queue
    </button>
</div>

<div class="section-label"><span class="flag">🇵🇭</span> Philippines</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('PHY_CR PPS ONSIT PSG CSR')">
        <i class="ti ti-headset"></i> Philippines CSR queue
    </button>
    <button class="btn-main" onclick="copy('PHY_CR PPS ONSITE PSG')">
        <i class="ti ti-truck-delivery"></i> Philippines onsite queue
    </button>
    <button class="btn-main" onclick="copy('PHY_CR PPS ONSITE TRADE')">
        <i class="ti ti-file-invoice"></i> Philippines onsite quote queue
    </button>
    <button class="btn-main" onclick="copy('MY_PH_ONS_BOT')">
        <i class="ti ti-robot"></i> Philippines onsite BOT queue
    </button>
</div>

<div class="section-label"><span class="flag">🇸🇬</span> Singapore</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('SEA_SGP_RA_CSRAPart')">
        <i class="ti ti-headset"></i> Singapore CSR queue
    </button>
    <button class="btn-main" onclick="copy('SEA_SGP_RA_MonitorPart')">
        <i class="ti ti-eye"></i> Singapore commercial monitor CSR queue
    </button>
    <button class="btn-main" onclick="copy('SGY_AD CC QUOTATION')">
        <i class="ti ti-file-invoice"></i> Singapore quote queue
    </button>
    <button class="btn-main" onclick="copy('SEA_SGP_RA_ONSITE')">
        <i class="ti ti-truck-delivery"></i> Singapore onsite queue
    </button>
    <button class="btn-main" onclick="copy('SEA_SGP_RA_PURR')">
        <i class="ti ti-truck-return"></i> Singapore PURR queue
    </button>
    <button class="btn-main" onclick="copy('SGY_ONS_RPACASE_ONS')">
        <i class="ti ti-robot"></i> Singapore ONS BOT queue
    </button>
</div>

<div class="section-label"><i class="ti ti-headset"></i> Poly</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('WW_POLY_HDST_PER_DEV_L1.5')">
        <i class="ti ti-headphones"></i> Poly L1.5
    </button>
</div>

<div class="section-label"><i class="ti ti-shield-check"></i> ADP</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('SGY_ADP Validation')">
        <i class="ti ti-checkup-list"></i> Sea Adp Validation queue
    </button>
    <button class="btn-main" onclick="copy('AUY_ADP Validation')">
        <i class="ti ti-checkup-list"></i> Anz Adp Calidation queue
    </button>
</div>

<div class="section-label"><i class="ti ti-shield-plus"></i> Warranty Update</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('APAC_CC_BLR CarePack')">
        <i class="ti ti-shield-plus"></i> CarePack update
    </button>
    <button class="btn-main" onclick="copy('APY_AD POP VALIDATION_C')">
        <i class="ti ti-file-certificate"></i> Warranty update
    </button>
</div>

<div id="toast"><i class="ti ti-check"></i> Copied to clipboard</div>

<script>
    function copy(text) {
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }).catch(err => console.error('Copy failed:', err));
    }
</script>

</body>
</html>
