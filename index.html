<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=0.9">
    <title>OmniTool</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --sidebar-bg: #13131f;
            --sidebar-header-border: rgba(255, 255, 255, 0.07);
            --sidebar-item-hover: rgba(255, 255, 255, 0.05);
            --sidebar-item-active: rgba(255, 255, 255, 0.09);
            --sidebar-text-muted: rgba(255, 255, 255, 0.38);
            --sidebar-text-normal: rgba(255, 255, 255, 0.55);
            --sidebar-text-active: #ffffff;
            --accent: #a78bfa;
            --topbar-bg: #ffffff;
            --topbar-border: #e8e8ec;
            --topbar-text: #111118;
            --topbar-sub: #888;
            --content-bg: #f4f4f7;
            --statusbar-bg: #ffffff;
            --statusbar-border: #e8e8ec;
            --statusbar-text: #888;
            --dot-online: #4ade80;
        }

        html, body {
            height: 100%;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #0e0e18;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: 210px;
            background: var(--sidebar-bg);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            flex-shrink: 0;
            border-right: 0.5px solid rgba(255, 255, 255, 0.06);
        }

        .sidebar-header {
            padding: 20px 16px 16px;
            border-bottom: 0.5px solid var(--sidebar-header-border);
        }

        .sidebar-logo {
            font-size: 13px;
            font-weight: 600;
            color: var(--sidebar-text-active);
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }

        .sidebar-tagline {
            font-size: 11px;
            color: var(--sidebar-text-muted);
            margin-top: 3px;
        }

        .nav {
            display: flex;
            flex-direction: column;
            padding: 8px 0;
            flex: 1;
            overflow-y: auto;
            gap: 1px;
            scrollbar-width: thin;
            scrollbar-color: rgba(255,255,255,0.1) transparent;
        }

        .nav::-webkit-scrollbar {
            width: 4px;
        }

        .nav::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }

        .nav-item {
            appearance: none;
            background: none;
            border: none;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 14px;
            cursor: pointer;
            font-size: 12.5px;
            color: var(--sidebar-text-normal);
            text-align: left;
            width: 100%;
            position: relative;
            transition: background 0.12s, color 0.12s;
            border-radius: 0;
            letter-spacing: 0.01em;
            white-space: nowrap;
        }

        .nav-item i {
            font-size: 15px;
            flex-shrink: 0;
            opacity: 0.7;
            transition: opacity 0.12s;
        }

        .nav-item:hover {
            background: var(--sidebar-item-hover);
            color: rgba(255, 255, 255, 0.8);
        }

        .nav-item:hover i {
            opacity: 0.9;
        }

        .nav-item.active {
            background: var(--sidebar-item-active);
            color: var(--sidebar-text-active);
        }

        .nav-item.active i {
            opacity: 1;
            color: var(--accent);
        }

        .nav-item.active::before {
            content: '';
            position: absolute;
            left: 0;
            top: 7px;
            bottom: 7px;
            width: 3px;
            background: var(--accent);
            border-radius: 0 2px 2px 0;
        }

        /* ── Main area ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            height: 48px;
            background: var(--topbar-bg);
            border-bottom: 1px solid var(--topbar-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            flex-shrink: 0;
        }

        .topbar-left {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .topbar-icon {
            font-size: 16px;
            color: var(--accent);
        }

        .topbar-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--topbar-text);
        }

        .topbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .topbar-badge {
            font-size: 11px;
            color: #666;
            background: #f0f0f3;
            border: 1px solid #e0e0e8;
            border-radius: 5px;
            padding: 2px 9px;
        }

        /* ── Content / iframe ── */
        .content {
            flex: 1;
            position: relative;
            background: var(--content-bg);
            overflow: hidden;
        }

        .tab-frame {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            display: none;
        }

        .tab-frame.active {
            display: block;
        }

        /* ── Status bar ── */
        .statusbar {
            height: 28px;
            background: var(--statusbar-bg);
            border-top: 1px solid var(--statusbar-border);
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            flex-shrink: 0;
        }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--dot-online);
            flex-shrink: 0;
        }

        .status-text {
            font-size: 11px;
            color: var(--statusbar-text);
        }

        .status-divider {
            width: 1px;
            height: 12px;
            background: #e0e0e8;
        }
    </style>
</head>

<body>

<div class="sidebar">
    <div class="sidebar-header">
        <div class="sidebar-logo">OmniTool</div>
            </div>

    <nav class="nav">
        <button class="nav-item active"
                data-page="TS_101.html"
                data-label="Troubleshooting"
                data-icon="ti-tools">
            <i class="ti ti-tools"></i>
            Troubleshooting
        </button>
        <button class="nav-item"
                data-page="TEMPLATES.html"
                data-label="Templates"
                data-icon="ti-file-text">
            <i class="ti ti-file-text"></i>
            Templates
        </button>
        <button class="nav-item"
                data-page="Snooze.html"
                data-label="Snooze"
                data-icon="ti-clock-pause">
            <i class="ti ti-clock-pause"></i>
            Snooze
        </button>
        <button class="nav-item"
                data-page="Subject.html"
                data-label="Case subject"
                data-icon="ti-tag">
            <i class="ti ti-tag"></i>
            Case subject
        </button>
        <button class="nav-item"
                data-page="Links.html"
                data-label="Links"
                data-icon="ti-link">
            <i class="ti ti-link"></i>
            Links
        </button>
        <button class="nav-item"
                data-page="Probing12.html"
                data-label="Probing"
                data-icon="ti-list-search">
            <i class="ti ti-list-search"></i>
            Probing
        </button>
        <button class="nav-item"
                data-page="EMAILZZ.html"
                data-label="Email templates"
                data-icon="ti-mail">
            <i class="ti ti-mail"></i>
            Email templates
        </button>
                <button class="nav-item"
                data-page="Email ID's.html"
                data-label="Email IDs"
                data-icon="ti-id-badge">
            <i class="ti ti-id-badge"></i>
            Email IDs
        </button>
                <button class="nav-item"
                data-page="pdf.html"
                data-label="PDF tool"
                data-icon="ti-file-type-pdf">
            <i class="ti ti-file-type-pdf"></i>
            PDF tool
        </button>
        <button class="nav-item"
                data-page="form.html"
                data-label="PSIR"
                data-icon="ti-clipboard-list">
            <i class="ti ti-clipboard-list"></i>
            PSIR
        </button>
    </nav>
</div>

<div class="main">
    <div class="topbar">
        <div class="topbar-left">
            <i class="ti ti-tools topbar-icon" id="topbar-icon"></i>
            <span class="topbar-title" id="topbar-title">Troubleshooting</span>
        </div>
        <div class="topbar-right">
            <span class="topbar-badge" id="topbar-page">TS_101.html</span>
        </div>
    </div>

    <div class="content">
        <iframe class="tab-frame active" data-page="TS_101.html"     src="TS_101.html"></iframe>
        <iframe class="tab-frame"        data-page="TEMPLATES.html"   src="TEMPLATES.html"></iframe>
        <iframe class="tab-frame"        data-page="Snooze.html"       src="Snooze.html"></iframe>
        <iframe class="tab-frame"        data-page="Subject.html"      src="Subject.html"></iframe>
        <iframe class="tab-frame"        data-page="Links.html"        src="Links.html"></iframe>
        <iframe class="tab-frame"        data-page="Probing12.html"    src="Probing12.html"></iframe>
        <iframe class="tab-frame"        data-page="EMAILZZ.html"      src="EMAILZZ.html"></iframe>
        <iframe class="tab-frame"        data-page="GA - Omnichannel PC Process Guide.html" src="GA - Omnichannel PC Process Guide.html"></iframe>
        <iframe class="tab-frame"        data-page="Email ID's.html"   src="Email ID's.html"></iframe>
        <iframe class="tab-frame"        data-page="postal_lookup.html" src="postal_lookup.html"></iframe>
        <iframe class="tab-frame"        data-page="Process.html"      src="Process.html"></iframe>
        <iframe class="tab-frame"        data-page="postal_lookup.html"      src="postal_lookup.html"></iframe>
        <iframe class="tab-frame"        data-page="pdf.html"          src="pdf.html"></iframe>
        <iframe class="tab-frame"        data-page="form.html"         src="form.html"></iframe>
        <iframe class="tab-frame"        data-page="warrdate.html"     src="warrdate.html"></iframe>
    </div>

    <div class="statusbar">
        <div class="status-indicator">
            <div class="status-dot"></div>
            <span class="status-text">Connected</span>
        </div>
        <div class="status-divider"></div>
        <span class="status-text" id="status-section">Troubleshooting</span>
    </div>
</div>

<script>
    const navItems = document.querySelectorAll('.nav-item');
    const frames   = document.querySelectorAll('.tab-frame');
    const topbarTitle = document.getElementById('topbar-title');
    const topbarIcon  = document.getElementById('topbar-icon');
    const topbarPage  = document.getElementById('topbar-page');
    const statusSection = document.getElementById('status-section');

    navItems.forEach(btn => {
        btn.addEventListener('click', function () {
            navItems.forEach(b => b.classList.remove('active'));
            this.classList.add('active');

            const page  = this.getAttribute('data-page');
            const label = this.getAttribute('data-label');
            const icon  = this.getAttribute('data-icon');

            frames.forEach(frame => {
                frame.classList.toggle('active', frame.getAttribute('data-page') === page);
            });

            topbarTitle.textContent   = label;
            topbarPage.textContent    = page;
            statusSection.textContent = label;
            topbarIcon.className = `ti ${icon} topbar-icon`;
        });
    });
</script>

</body>
</html>
