<!DOCTYPE html>
<html>
<head>
<title>PSIR Generator</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs/dist/exceljs.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
        font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        background: #f4f4f7;
        padding: 20px 24px 40px;
    }

    .page-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
        padding-bottom: 14px;
        border-bottom: 1px solid #e0e0e8;
    }

    .page-header-left {
        display: flex;
        align-items: center;
        gap: 10px;
    }

    .page-header i.header-icon { font-size: 18px; color: #a78bfa; }

    .page-header h1 {
        font-size: 14px;
        font-weight: 600;
        color: #111118;
        letter-spacing: 0.04em;
        text-transform: uppercase;
    }

    .btn-questions {
        background: linear-gradient(135deg, #EF4765, #FF9A5A);
        border: none;
        border-radius: 7px;
        color: #fff;
        cursor: pointer;
        font-family: inherit;
        font-size: 11.5px;
        font-weight: 600;
        padding: 7px 14px;
        display: flex;
        align-items: center;
        gap: 6px;
        transition: opacity 0.15s, box-shadow 0.15s;
    }

    .btn-questions:hover {
        opacity: 0.92;
        box-shadow: 0 2px 12px rgba(239,71,101,0.35);
    }

    .btn-questions i { font-size: 13px; }

    /* Card */
    .card {
        background: #fff;
        border: 1px solid #e0e0e8;
        border-radius: 10px;
        overflow: hidden;
        margin-bottom: 12px;
    }

    .card-header {
        padding: 9px 16px;
        border-bottom: 1px solid #e0e0e8;
        background: #fafafa;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #a78bfa;
    }

    .card-body {
        padding: 14px 16px;
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        gap: 4px;
    }

    label {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        color: #999;
    }

    input, textarea {
        width: 100%;
        padding: 7px 10px;
        font-size: 12.5px;
        font-family: inherit;
        border: 1px solid #e0e0e8;
        border-radius: 6px;
        background: #fafafa;
        color: #111118;
        outline: none;
        transition: border-color 0.15s, box-shadow 0.15s;
    }

    input:focus, textarea:focus {
        border-color: #a78bfa;
        box-shadow: 0 0 0 2px rgba(167,139,250,0.18);
        background: #fff;
    }

    textarea {
        resize: vertical;
        min-height: 80px;
    }

    /* Submit button */
    .btn-download {
        background: linear-gradient(135deg, #EF4765, #FF9A5A);
        border: none;
        border-radius: 7px;
        color: #fff;
        cursor: pointer;
        font-family: inherit;
        font-size: 12.5px;
        font-weight: 600;
        padding: 10px 24px;
        display: flex;
        align-items: center;
        gap: 8px;
        transition: opacity 0.15s, box-shadow 0.15s;
        margin: 16px auto 0;
    }

    .btn-download:hover {
        opacity: 0.92;
        box-shadow: 0 2px 12px rgba(239,71,101,0.35);
    }

    .btn-download i { font-size: 14px; }

    /* Toast */
    #toast {
        position: fixed;
        bottom: 20px;
        right: 20px;
        background: #111118;
        color: #fff;
        font-size: 12px;
        font-weight: 500;
        padding: 9px 16px;
        border-radius: 7px;
        opacity: 0;
        transform: translateY(8px);
        transition: opacity 0.2s, transform 0.2s;
        pointer-events: none;
        display: flex;
        align-items: center;
        gap: 8px;
        z-index: 999;
    }

    #toast.show { opacity: 1; transform: translateY(0); }
    #toast i { color: #4ade80; font-size: 14px; }

    @media (max-width: 520px) {
        .form-row { grid-template-columns: 1fr; }
    }
</style>
</head>
<body>

<div class="page-header">
    <div class="page-header-left">
        <i class="ti ti-file-spreadsheet header-icon"></i>
        <h1>PSIR Escalation Form</h1>
    </div>
    <button type="button" class="btn-questions" onclick="copyQuestions()">
        <i class="ti ti-clipboard-list"></i> Copy Questions
    </button>
</div>

<form id="psirForm">

    <!-- Case Information -->
    <div class="card">
        <div class="card-header">Case Information</div>
        <div class="card-body">
            <div class="form-row">
                <div class="form-group">
                    <label>Elevated Case #</label>
                    <input name="case_id" placeholder="e.g. CASE-00123">
                </div>
                <div class="form-group">
                    <label>Incident Date</label>
                    <input name="incident_date" type="date">
                </div>
            </div>
            <div class="form-group">
                <label>Company &amp; Customer Name</label>
                <input name="company" placeholder="e.g. Acme Corp – John Doe">
            </div>
            <div class="form-group">
                <label>Address</label>
                <input name="address" placeholder="Street address">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Country</label>
                    <input name="country" placeholder="e.g. Australia">
                </div>
                <div class="form-group">
                    <label>Phone</label>
                    <input name="phone" placeholder="+1 000-000-0000">
                </div>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input name="email" type="email" placeholder="customer@example.com">
            </div>
        </div>
    </div>

    <!-- Product Information -->
    <div class="card">
        <div class="card-header">Product Information</div>
        <div class="card-body">
            <div class="form-row">
                <div class="form-group">
                    <label>Product Number</label>
                    <input name="product_number" placeholder="e.g. AB1234#ABA">
                </div>
                <div class="form-group">
                    <label>Serial Number</label>
                    <input name="serial_number" placeholder="e.g. 5CD1234567">
                </div>
            </div>
        </div>
    </div>

    <!-- Incident Details -->
    <div class="card">
        <div class="card-header">Incident Details</div>
        <div class="card-body">
            <div class="form-row">
                <div class="form-group">
                    <label>Personal Injury</label>
                    <input name="personal_injury" placeholder="Describe any injuries">
                </div>
                <div class="form-group">
                    <label>Property Damage</label>
                    <input name="property_damage" placeholder="Describe any damage">
                </div>
            </div>
            <div class="form-group">
                <label>Customer Statement</label>
                <textarea name="customer_statement" placeholder="Customer's account of the incident..."></textarea>
            </div>
            <div class="form-group">
                <label>Description of Product Setup</label>
                <textarea name="product_setup" placeholder="How was the product set up at the time..."></textarea>
            </div>
            <div class="form-group">
                <label>Description of Product Environment</label>
                <textarea name="product_environment" placeholder="Where and how was the product being used..."></textarea>
            </div>
            <div class="form-group">
                <label>Description of Weather</label>
                <input name="weather" placeholder="e.g. Rainy, humid, hot summer...">
            </div>
        </div>
    </div>

    <button type="button" class="btn-download" onclick="generateExcel()">
        <i class="ti ti-file-download"></i> Download Excel
    </button>

</form>

<div id="toast"><i class="ti ti-check"></i> Questions copied to clipboard</div>

<script>
function showToast() {
    const t = document.getElementById('toast');
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2500);
}

function copyQuestions() {
    const text = `please do help me with the below questions

1. Kindly confirm if there were any personal Injury that had occurred?
2. Kindly confirm if there were any Property damage that had occurred?
3. Please do give us a statement as to how the issue had occurred?
4. Please do help us with a description of Product Setup.
5. Please do help us with a description of Product Environment.
6. Please do tell us what was the Weather at Time of Incident.`;

    navigator.clipboard.writeText(text).then(showToast).catch(() => {
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast();
    });
}

async function generateExcel() {
    const data = new FormData(document.getElementById('psirForm'));
    const workbook = new ExcelJS.Workbook();
    const sheet = workbook.addWorksheet('PSIR');

    sheet.columns = [{width:5},{width:5},{width:75},{width:75}];

    const border = { top:{style:'thin'}, left:{style:'thin'}, bottom:{style:'thin'}, right:{style:'thin'} };

    function style(cell) {
        cell.border = border;
        cell.alignment = {wrapText:true, vertical:'top'};
    }

    function row(r, c, text) {
        const cell = sheet.getCell(c+r);
        cell.value = text;
        style(cell);
        style(sheet.getCell('D'+r));
    }

    sheet.getCell('C2').value = 'PSIR - Potential Safety Incident Report for Commercial & Consumer units';
    sheet.getCell('C2').font = {bold:true};

    row(4,'C','Information Required'); row(4,'D','Information Gathered');
    row(5,'C','Elevated Case #'); row(6,'C','Company & Customer Name:');
    row(7,'C','Incident Date:'); row(8,'C','Address:');
    row(9,'C','Country:'); row(10,'C','Email'); row(11,'C','Phone');
    row(13,'C','Product Information');
    row(14,'C','Product Number:'); row(15,'C','Serial Number:');
    row(16,'C','Personal Injury:'); row(17,'C','Property Damage:');
    row(18,'C','Customer Statement');
    row(20,'C','Description of Product Setup');
    row(24,'C','Description of Product Environment');
    row(26,'C','Description of Weather at the time of the incident:');

    sheet.getCell('D5').value  = data.get('case_id');
    sheet.getCell('D6').value  = data.get('company');
    sheet.getCell('D7').value  = data.get('incident_date');
    sheet.getCell('D8').value  = data.get('address');
    sheet.getCell('D9').value  = data.get('country');
    sheet.getCell('D10').value = data.get('email');
    sheet.getCell('D11').value = data.get('phone');
    sheet.getCell('D14').value = data.get('product_number');
    sheet.getCell('D15').value = data.get('serial_number');
    sheet.getCell('D16').value = data.get('personal_injury');
    sheet.getCell('D17').value = data.get('property_damage');
    sheet.getCell('D18').value = data.get('customer_statement');
    sheet.getCell('D20').value = data.get('product_setup');
    sheet.getCell('D24').value = data.get('product_environment');
    sheet.getCell('D26').value = data.get('weather');

    sheet.getRow(18).height = 60;
    sheet.getRow(20).height = 80;
    sheet.getRow(24).height = 80;

    row(28,'C','(Rainy, humid, moist, hot summer, etc)');
    row(30,'C','Additional Notes: (Is customer looking for FA or Only service)');

    const c31 = sheet.getCell('C31');
    c31.value = { richText: [
        {text:'Note: Make sure to mention ', font:{color:{argb:'FF000000'}}},
        {text:'HP CONFIDENTIAL', font:{color:{argb:'FFFF0000'}, bold:true}},
        {text:' in all the pulse mails.', font:{color:{argb:'FF000000'}}}
    ]};
    style(c31);

    const c32 = sheet.getCell('C32');
    c32.value = 'Refer to Training Content in Helping Hand Teams Channel';
    c32.font = {color:{argb:'FFFF0000'}};
    style(c32);

    row(33,'C','Images to be captures and shared one to one - Refer the attached pdf file as reference');
    row(34,'C','Highlight the affected area with a red circle in the picture');
    row(35,'C','Images showing the Top view with Lid closed');
    row(36,'C','Images showing the Top view with Lid open (covering display and top cover)');
    row(37,'C','Images showing the Base Enclosure');
    row(38,'C','Images of the battery (Front, Back, Left & Right - for external battery models only)');
    row(39,'C','Images of the Battery of CT number and Part # (should be readable enough) - for external battery models only');
    row(40,'C','Images of the AC Adapter of CT number and Part # (should be readable enough)');
    row(41,'C','Images of the Power Cable of CT number and Part # (should be readable enough)');

    const buffer = await workbook.xlsx.writeBuffer();
    const blob = new Blob([buffer], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'PSIR_Report.xlsx';
    link.click();
}
</script>

</body>
</html>
