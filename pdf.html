<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image to PDF Creator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #3b1f14;
            font-family: Arial, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding: 32px 16px;
        }

        .container {
            background: pink;
            max-width: 640px;
            width: 100%;
            border-radius: 16px;
            padding: 36px 36px 32px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.35);
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #3b1f14;
            margin-bottom: 24px;
            text-align: center;
            letter-spacing: 0.5px;
        }

        .uploader {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-bottom: 20px;
        }

        .upload-label {
            background: #3b1f14;
            color: #fff;
            padding: 10px 22px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: inline-block;
            transition: opacity 0.2s;
        }
        .upload-label:hover { opacity: 0.85; }

        .upload-label.purple {
            background: #6c3a8c;
        }

        .dropzone {
            border: 2px dashed #b5648a;
            border-radius: 12px;
            padding: 24px 16px;
            margin-bottom: 16px;
            background: rgba(255,255,255,0.35);
            color: #7a2d50;
            font-size: 14px;
            font-weight: 500;
            transition: background 0.2s, border-color 0.2s;
            text-align: center;
        }
        .dropzone.dragover {
            background: rgba(255,255,255,0.55);
            border-color: #3b1f14;
            color: #3b1f14;
        }

        .preview-list {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            justify-content: center;
            min-height: 40px;
        }

        .preview-item {
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255,255,255,0.5);
            border-radius: 10px;
            border: 2px solid transparent;
            padding: 8px 6px 6px;
            transition: border 0.2s;
        }
        .preview-item.dragging { opacity: 0.4; }
        .preview-item.dragover {
            border: 2px dashed #3b1f14;
            background: rgba(255,255,255,0.7);
        }

        .preview-item img {
            width: 90px;
            height: 90px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 6px;
            background: #fff;
        }

        .btn-group { display: flex; gap: 4px; }

        .remove-btn, .move-btn {
            border: none;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }
        .remove-btn { background: #c0392b; color: #fff; }
        .remove-btn:hover { background: #a93226; }
        .move-btn { background: #3b1f14; color: #fff; }
        .move-btn:hover { background: #5a3020; }
        .move-btn:disabled { background: #c4a89a; cursor: not-allowed; }

        .actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .pdf-btn, .clear-btn, .merge-btn {
            padding: 10px 28px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: opacity 0.2s, transform 0.1s;
        }
        .pdf-btn { background: #3b1f14; color: #fff; }
        .pdf-btn:hover:not(:disabled) { opacity: 0.85; }
        .pdf-btn:disabled { background: #c4a89a; cursor: not-allowed; }

        .clear-btn { background: rgba(255,255,255,0.5); color: #3b1f14; border: 1.5px solid #b5648a; }
        .clear-btn:hover { background: rgba(255,255,255,0.75); }

        .merge-btn { background: #6c3a8c; color: #fff; }
        .merge-btn:hover:not(:disabled) { opacity: 0.85; }
        .merge-btn:disabled { background: #c4a89a; cursor: not-allowed; }

        #merge-pdf-btn { display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>PDF Tool</h1>

        <div class="uploader">
            <div>
                <input type="file" multiple accept="image/*" id="image-input" style="display:none">
                <label for="image-input" class="upload-label">Select Images</label>
            </div>
            <div>
                <input type="file" multiple accept="application/pdf" id="pdf-merge-input" style="display:none">
                <label for="pdf-merge-input" class="upload-label purple">Select PDFs</label>
            </div>
        </div>

        <button id="merge-pdf-btn" class="merge-btn">Merge PDFs</button>

        <div id="dropzone" class="dropzone">Drag &amp; Drop images here</div>
        <div id="preview-list" class="preview-list"></div>

        <div id="actions" class="actions" style="display:none">
            <button id="pdf-btn" class="pdf-btn">Create PDF</button>
            <button id="clear-btn" class="clear-btn">Clear All</button>
        </div>
    </div>

    <script>
        let images = [];
        let draggingIdx = null;
        let pdfFiles = [];

        const imageInput = document.getElementById('image-input');
        const previewList = document.getElementById('preview-list');
        const actions = document.getElementById('actions');
        const pdfBtn = document.getElementById('pdf-btn');
        const clearBtn = document.getElementById('clear-btn');
        const dropzone = document.getElementById('dropzone');
        const pdfMergeInput = document.getElementById('pdf-merge-input');
        const mergePdfBtn = document.getElementById('merge-pdf-btn');

        function renderPreviews() {
            previewList.innerHTML = '';
            images.forEach((imgObj, idx) => {
                const div = document.createElement('div');
                div.className = 'preview-item';
                div.setAttribute('draggable', 'true');
                div.dataset.idx = idx;
                if (draggingIdx === idx) div.classList.add('dragging');

                const img = document.createElement('img');
                img.src = imgObj.url;
                img.alt = `image ${idx + 1}`;

                const btnGroup = document.createElement('div');
                btnGroup.className = 'btn-group';

                const upBtn = document.createElement('button');
                upBtn.className = 'move-btn';
                upBtn.title = 'Move Up';
                upBtn.innerHTML = '↑';
                upBtn.disabled = idx === 0;
                upBtn.onclick = () => moveImage(idx, idx - 1);

                const downBtn = document.createElement('button');
                downBtn.className = 'move-btn';
                downBtn.title = 'Move Down';
                downBtn.innerHTML = '↓';
                downBtn.disabled = idx === images.length - 1;
                downBtn.onclick = () => moveImage(idx, idx + 1);

                const removeBtn = document.createElement('button');
                removeBtn.className = 'remove-btn';
                removeBtn.title = 'Remove';
                removeBtn.textContent = '×';
                removeBtn.onclick = () => {
                    images.splice(idx, 1);
                    if (imgObj.url.startsWith('blob:')) URL.revokeObjectURL(imgObj.url);
                    updateUI();
                };

                btnGroup.appendChild(upBtn);
                btnGroup.appendChild(downBtn);
                btnGroup.appendChild(removeBtn);

                div.addEventListener('dragstart', e => {
                    draggingIdx = idx;
                    div.classList.add('dragging');
                    e.dataTransfer.effectAllowed = 'move';
                    e.dataTransfer.setData('text/plain', idx);
                });
                div.addEventListener('dragend', () => { draggingIdx = null; updateUI(); });
                div.addEventListener('dragover', e => {
                    e.preventDefault();
                    if (draggingIdx !== null && draggingIdx !== idx) div.classList.add('dragover');
                });
                div.addEventListener('dragleave', () => div.classList.remove('dragover'));
                div.addEventListener('drop', e => {
                    e.preventDefault();
                    div.classList.remove('dragover');
                    if (draggingIdx !== null && draggingIdx !== idx) moveImage(draggingIdx, idx);
                    draggingIdx = null;
                });

                div.appendChild(img);
                div.appendChild(btnGroup);
                previewList.appendChild(div);
            });
        }

        function moveImage(fromIdx, toIdx) {
            if (toIdx < 0 || toIdx > images.length) return;
            const temp = images[fromIdx];
            images.splice(fromIdx, 1);
            images.splice(toIdx, 0, temp);
            updateUI();
        }

        function updateUI() {
            renderPreviews();
            actions.style.display = images.length === 0 ? 'none' : 'flex';
            pdfBtn.disabled = images.length === 0;
        }

        imageInput.addEventListener('change', e => {
            addImageFiles(Array.from(e.target.files));
            imageInput.value = '';
        });

        function addImageFiles(files) {
            const imageObjs = files.filter(f => f.type.startsWith('image/')).map(f => ({ file: f, url: URL.createObjectURL(f) }));
            images = images.concat(imageObjs);
            updateUI();
        }

        clearBtn.onclick = () => {
            images.forEach(imgObj => { if (imgObj.url.startsWith('blob:')) URL.revokeObjectURL(imgObj.url); });
            images = [];
            updateUI();
        };

        pdfBtn.onclick = async () => {
            pdfBtn.disabled = true;
            pdfBtn.textContent = 'Creating...';
            await generatePdfFromImages(images.map(img => img.file));
            pdfBtn.disabled = false;
            pdfBtn.textContent = 'Create PDF';
        };

        async function generatePdfFromImages(imageFiles) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            for (let i = 0; i < imageFiles.length; i++) {
                const imgData = await readFileAsDataURL(imageFiles[i]);
                const img = new window.Image();
                await new Promise(resolve => { img.onload = resolve; img.src = imgData; });
                const pw = doc.internal.pageSize.getWidth();
                const ph = doc.internal.pageSize.getHeight();
                const ratio = Math.min(pw / img.width, ph / img.height);
                const w = img.width * ratio;
                const h = img.height * ratio;
                if (i > 0) doc.addPage();
                doc.addImage(imgData, 'JPEG', (pw - w) / 2, (ph - h) / 2, w, h);
            }
            let name = prompt('Enter PDF name:', 'images.pdf');
            if (!name || !name.trim()) name = 'images.pdf';
            doc.save(name);
        }

        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('dragover'); });
        dropzone.addEventListener('dragleave', () => dropzone.classList.remove('dragover'));
        dropzone.addEventListener('drop', e => {
            e.preventDefault();
            dropzone.classList.remove('dragover');
            addImageFiles(Array.from(e.dataTransfer.files));
        });

        pdfMergeInput.addEventListener('change', e => {
            pdfFiles = Array.from(e.target.files);
            mergePdfBtn.style.display = pdfFiles.length > 0 ? 'inline-block' : 'none';
        });

        mergePdfBtn.onclick = async () => {
            if (!pdfFiles.length) return;
            const fileName = prompt('Enter merged PDF name:', 'merged.pdf') || 'merged.pdf';
            mergePdfBtn.disabled = true;
            mergePdfBtn.textContent = 'Merging...';
            const merged = await mergePDFs(pdfFiles);
            const bytes = await merged.save();
            const blob = new Blob([bytes], { type: 'application/pdf' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = fileName;
            a.click();
            mergePdfBtn.disabled = false;
            mergePdfBtn.textContent = 'Merge PDFs';
        };

        async function mergePDFs(files) {
            const { PDFDocument } = PDFLib;
            const mergedPdf = await PDFDocument.create();
            for (const file of files) {
                const buf = await file.arrayBuffer();
                const pdf = await PDFDocument.load(buf);
                const pages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                pages.forEach(p => mergedPdf.addPage(p));
            }
            return mergedPdf;
        }

        updateUI();
    </script>
</body>
</html>
