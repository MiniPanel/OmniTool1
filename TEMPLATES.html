<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Templates</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f4f4f7;
            padding: 20px 24px 40px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e0e0e8;
        }

        .page-header i {
            font-size: 18px;
            color: #a78bfa;
        }

        .page-header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #111118;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .btn-main {
            background: linear-gradient(135deg, #EF4765, #FF9A5A);
            border: none;
            border-radius: 7px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 9px 14px;
            text-align: left;
            transition: opacity 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            line-height: 1.3;
        }

        .btn-main:hover {
            opacity: 0.92;
            box-shadow: 0 2px 12px rgba(239, 71, 101, 0.35);
        }

        .btn-main i {
            font-size: 13px;
            flex-shrink: 0;
            opacity: 0.9;
        }

        .btn-num {
            font-size: 10px;
            opacity: 0.75;
            flex-shrink: 0;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            padding: 1px 5px;
            font-weight: 700;
        }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111118;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            padding: 9px 16px;
            border-radius: 7px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 999;
        }

        #toast.show { opacity: 1; transform: translateY(0); }
        #toast i { color: #4ade80; font-size: 14px; }
    </style>
</head>
<body>

<div class="page-header">
    <i class="ti ti-clipboard-text"></i>
    <h1>Templates</h1>
</div>

<div class="btn-grid">

    <button class="btn-main" onclick="copy('I will now proceed to arrange for a service and the technician will be contacting you in 3-4 business days')">
        <i class="ti ti-tools"></i><span class="btn-num">01</span> Onsite (SEA)
    </button>

    <button class="btn-main" onclick="copy('I will now proceed to arrange for a service and the technician will be contacting you in 1-2 business days')">
        <i class="ti ti-tools"></i><span class="btn-num">02</span> Onsite (ANZ)
    </button>

    <button class="btn-main" onclick="copy('I will go ahead and arrange a pickup service\nwhere your unit will be picked from your address and dropped at the service center,\nIt will take 5-7 business days to complete the service.')">
        <i class="ti ti-truck"></i><span class="btn-num">03</span> PURR
    </button>

    <button class="btn-main" onclick="copy('I see that you are here for a case update, let me have a check and assist you.')">
        <i class="ti ti-refresh"></i><span class="btn-num">04</span> Case Update
    </button>

    <button class="btn-main" onclick="copy('xxxxxx, I would need to have this consulted with my product specialist team and will get back to you with an update once I hear from them, How about that?')">
        <i class="ti ti-users"></i><span class="btn-num">05</span> EMT Update
    </button>

    <button class="btn-main" onclick="copy('Before proceeding with the service, we would need to isolate the issue and once the issue is narrowed down we would proceed further accordingly,Shall we begin troubleshooting the issue?')">
        <i class="ti ti-search"></i><span class="btn-num">06</span> Service Before TS
    </button>

    <button class="btn-main" onclick="copy('We have arranged for an onsite service, where the tech will visit your address and replace the part.\nYou may expect the service depending on the part availability.\nThe team concerned will contact you and let you know the ETA.\nAlso, the onsite tech will give you a call before visiting.')">
        <i class="ti ti-calendar"></i><span class="btn-num">07</span> Onsite Visit
    </button>

    <button class="btn-main" onclick="copy('I will proceed with the necessary arrangements to arrange for a service. Please note that the technician will inspect the unit for any faults and assess whether a part replacement is necessary. If any damages are found, the respective part will be replaced on a chargeable basis.')">
        <i class="ti ti-note"></i><span class="btn-num">08</span> Tech Note
    </button>

    <button class="btn-main" onclick="copy('Below are the addresses for the Carry-In Service. Please choose one:\n\n- 353 Burwood Hwy, Forest Hill VIC 3131\n- Level 2/234 Collins St, Melbourne VIC 3000 (Elite Lounge)')">
        <i class="ti ti-map-pin"></i><span class="btn-num">09</span> Melwalkin Address
    </button>

    <button class="btn-main" onclick="copy('************************************************** CARRY-IN TEMPLATE **************************************************\n\nCustomer Name: \n\nPhone Number: \n\nAlternate Number: N/A\n\nEmail Address: \n\nBest Reachable Time (BRT): 9 AM \u2013 5 PM\n\nPart Recommended: \n\nType of Service: Carry-in\n\nService Center Address Given As: ')">
        <i class="ti ti-file-text"></i><span class="btn-num">10</span> Melwalkin Template
    </button>

    <button class="btn-main" onclick="copy('I will check for the availability of the required part in your country, If it is available, I will inform you and share a quotation. If not, I would recommend reaching out to a local technician for assistance with the replacement.')">
        <i class="ti ti-package"></i><span class="btn-num">11</span> Part Availability
    </button>

    <button class="btn-main" onclick="copy('Press windows and R together, in the pop-up please type and search and enter for msinfo32 please do share an image of the screen that comes up.')">
        <i class="ti ti-cpu"></i><span class="btn-num">12</span> BIOS Version
    </button>

    <button class="btn-main" onclick="copy('Please use the below steps to backup the Bitlocker key.\n\nBack Up Using BitLocker Management (Windows Settings)\nPress Windows key \u2192 type BitLocker \u2192 open Manage BitLocker.\nUnder the drive that is encrypted, click Back up your recovery key.\nChoose one of the available options:\n  Save to your Microsoft account\n  Save to a USB flash drive\n  Save to a file\n  Print the recovery key\nFollow the prompts to complete the backup.')">
        <i class="ti ti-lock"></i><span class="btn-num">13</span> BitLocker Key Backup
    </button>

    <button class="btn-main" onclick="copy('Please be informed, After 24 hours we will not be able to send any message on this channel, until there is a message from your end, but we will only be able to send a few snooze messages to get a response from your end.')">
        <i class="ti ti-clock-pause"></i><span class="btn-num">14</span> Greyed Out
    </button>

    <button class="btn-main" onclick="copy('HP does not provide support for open-box troubleshooting or RAM upgrades. However, these actions are not prohibited. If assistance is required, we recommend contacting a local technician or an authorized reseller for professional support.')">
        <i class="ti ti-info-circle"></i><span class="btn-num">15</span> RAM Upgradation Policy
    </button>

    <button class="btn-main" onclick="copy('There are no service centers; only HP authorized drop-off points are available. You can drop off the unit, and once the repair is completed, you can collect it.\n\nYou can find the drop-off point details here:\nhttps://support.hp.com/my-en/document/c02986448')">
        <i class="ti ti-map-2"></i><span class="btn-num">16</span> Drop Off Points
    </button>

</div>

<div id="toast"><i class="ti ti-check"></i> Copied to clipboard</div>

<script>
    function copy(text) {
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }).catch(err => console.error('Copy failed:', err));
    }
</script>

</body>
</html>
