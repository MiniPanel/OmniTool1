<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDL</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: #f4f4f7;
            padding: 20px 24px 40px;
        }

        .page-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 1px solid #e0e0e8;
        }

        .page-header i { font-size: 18px; color: #a78bfa; }

        .page-header h1 {
            font-size: 14px;
            font-weight: 600;
            color: #111118;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .section-label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: #aaa;
            margin: 14px 0 6px;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 8px;
        }

        .btn-main {
            background: linear-gradient(135deg, #EF4765, #FF9A5A);
            border: none;
            border-radius: 7px;
            color: #fff;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            font-weight: 600;
            letter-spacing: 0.02em;
            padding: 9px 14px;
            text-align: left;
            transition: opacity 0.15s, box-shadow 0.15s;
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            line-height: 1.3;
        }

        .btn-main:hover {
            opacity: 0.92;
            box-shadow: 0 2px 12px rgba(239, 71, 101, 0.35);
        }

        .btn-main i { font-size: 13px; flex-shrink: 0; opacity: 0.9; }

        #toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #111118;
            color: #fff;
            font-size: 12px;
            font-weight: 500;
            padding: 9px 16px;
            border-radius: 7px;
            opacity: 0;
            transform: translateY(8px);
            transition: opacity 0.2s, transform 0.2s;
            pointer-events: none;
            display: flex;
            align-items: center;
            gap: 8px;
            z-index: 999;
        }

        #toast.show { opacity: 1; transform: translateY(0); }
        #toast i { color: #4ade80; font-size: 14px; }
    </style>
</head>
<body>

<div class="page-header">
    <i class="ti ti-id-badge"></i>
    <h1>Email IDs — PDL</h1>
</div>

<div class="section-label">General</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('sneha.k@hp.com; yuvetha.balakrishnan@hp.com; revathi.s.kumar@hp.com; sumitb@hp.com')">
        <i class="ti ti-users"></i> Leads
    </button>
    <button class="btn-main" onclick="copy('hpspacpschat@hp.com')">
        <i class="ti ti-message-circle"></i> Omni Channel
    </button>
    <button class="btn-main" onclick="copy('apj-global-trade-general-queries@hp.com')">
        <i class="ti ti-world"></i> GT Check
    </button>
    <button class="btn-main" onclick="copy('hpapjhelpdesk@hp.com')">
        <i class="ti ti-headset"></i> SG Helpdesk
    </button>
    <button class="btn-main" onclick="copy('hpcustomersupportcdcbapjemt@hp.com')">
        <i class="ti ti-clipboard-list"></i> EMT
    </button>
    <button class="btn-main" onclick="copy('pps_carepack_ap@hp.com')">
        <i class="ti ti-shield-plus"></i> Carepack
    </button>
    <button class="btn-main" onclick="copy('auolsclaims@hp.com')">
        <i class="ti ti-file-invoice"></i> AU OLS
    </button>
    <button class="btn-main" onclick="copy('apacsprdoa@hp.com')">
        <i class="ti ti-alert-triangle"></i> DOA
    </button>
</div>

<div class="section-label">Part Availability</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('SthPacPlanningPPS@hp.com')">
        <i class="ti ti-package"></i> Part Availability — ANZ
    </button>
    <button class="btn-main" onclick="copy('ssc.sea.dbo@hp.com')">
        <i class="ti ti-package"></i> Part Availability — SEA
    </button>
</div>

<div class="section-label">Resource Admin</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('sp-hpcs-cm-resourceadmin@hp.com')">
        <i class="ti ti-building"></i> RA Team — Australia
    </button>
    <button class="btn-main" onclick="copy('myonsite.resourceadmin@hp.com')">
        <i class="ti ti-building"></i> RA Team — Malaysia
    </button>
    <button class="btn-main" onclick="copy('sg.resourceadmin@hp.com')">
        <i class="ti ti-building"></i> RA Team — Singapore
    </button>
</div>

<div class="section-label">Trade / Quote</div>
<div class="btn-grid">
    <button class="btn-main" onclick="copy('hp_pps_cc@hp.com')">
        <i class="ti ti-file-invoice"></i> Quote — Australia (Consumer)
    </button>
    <button class="btn-main" onclick="copy('hp_pps_repair_order@hp.com')">
        <i class="ti ti-file-invoice"></i> Quote — Australia (Commercial)
    </button>
    <button class="btn-main" onclick="copy('myonsitequote@hp.com')">
        <i class="ti ti-file-invoice"></i> Quote — Malaysia
    </button>
    <button class="btn-main" onclick="copy('sgonsitequote@hp.com')">
        <i class="ti ti-file-invoice"></i> Quote — Singapore
    </button>
</div>

<div id="toast"><i class="ti ti-check"></i> Copied to clipboard</div>

<script>
    function copy(text) {
        navigator.clipboard.writeText(text).then(() => {
            const t = document.getElementById('toast');
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }).catch(err => console.error('Copy failed:', err));
    }
</script>

</body>
</html>
